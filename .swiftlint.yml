included:
  - HBIT
  - Packages
excluded:
  - "**/.build"

disabled_rules:
  - todo
  - trailing_comma

line_length:
  warning: 140
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded: [x, y, i, id]

nesting:
  type_level: 2

# AlarmCoordinator legitimately orchestrates the whole alarm lifecycle;
# revisit if it keeps growing past these.
type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 600
  error: 1000
